{% extends "base.html" %}
{% block title %}Change Password — NetGuard{% endblock %}
{% block page_title %}Change Password{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-6">
    <div class="card glass-card">
      <div class="card-header"><i class="bi bi-key me-2"></i>Change Password</div>
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('auth.change_password') }}">
          <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input type="password" name="old_password" class="form-control glass-input" required>
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="new_password" class="form-control glass-input" required minlength="8">
          </div>
          <div class="mb-4">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="confirm_password" class="form-control glass-input" required minlength="8">
          </div>
          <button type="submit" class="btn btn-gradient w-100">
            <i class="bi bi-check-circle me-1"></i> Update Password
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
